name: AnyToneMac
options:
  bundleIdPrefix: me.faulk.anytone
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_OBJC_BRIDGING_HEADER: AnyToneMac/BridgingHeader.h
    LIBRARY_SEARCH_PATHS: $(SRCROOT)
    HEADER_SEARCH_PATHS:
      - $(SRCROOT)/core/include
    OTHER_LDFLAGS:
      - -lanytone_core
      - -framework IOKit
      - -framework CoreFoundation
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  AnyToneMac:
    type: application
    platform: macOS
    sources:
      - path: AnyToneMac
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.faulk.anytone.mac
        PRODUCT_NAME: AnyToneMac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: AnyTone Mac
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SYMROOT: $(SRCROOT)/build
    preBuildScripts:
      - name: "Build Rust Library"
        script: |
          "${SRCROOT}/build-rust.sh"
        basedOnDependencyAnalysis: false
    scheme:
      testTargets:
        - AnyToneMacTests

  AnyToneMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AnyToneMacTests
    dependencies:
      - target: AnyToneMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.faulk.anytone.mac.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
