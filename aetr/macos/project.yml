name: Aetr
options:
  bundleIdPrefix: me.faulk
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    # The pre-build script writes libaetr_core.a and Generated/ into SRCROOT.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    LIBRARY_SEARCH_PATHS: $(SRCROOT)
    # Expose the UniFFI C module (aetr_coreFFI) to Swift via its modulemap.
    OTHER_SWIFT_FLAGS: "-Xcc -fmodule-map-file=$(SRCROOT)/Generated/aetr_coreFFI.modulemap"
    OTHER_LDFLAGS:
      - -laetr_core
      - -lc++

targets:
  Aetr:
    type: application
    platform: macOS
    sources:
      - path: Aetr
        excludes:
          - "**/.DS_Store"
      - path: Generated/aetr_core.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.faulk.aetr
        PRODUCT_NAME: Aetr
        CODE_SIGN_ENTITLEMENTS: Aetr/Aetr.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Aetr
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Aetr needs microphone access to receive encrypted transmissions from the radio audio and to record voice clips for sending."
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SYMROOT: $(SRCROOT)/build
    preBuildScripts:
      - name: "Build Rust Library"
        script: |
          "${SRCROOT}/build-rust.sh"
        basedOnDependencyAnalysis: false
