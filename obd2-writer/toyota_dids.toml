# ============================================================
# BCM (Body Control Module) — 0x750
# Customization settings configurable via Techstream
#
# WARNING: The DID addresses below (0xB1xx) are UNVERIFIED
# placeholders. These settings exist in Techstream but Toyota
# does not publish the DID hex addresses. To discover real
# addresses, either:
#   1. Sniff Techstream CAN traffic while changing a setting
#   2. Brute-force scan: Mode 22 sweep on 0x750 (ranges
#      0x0100-0x01FF, 0xB000-0xBFFF, 0xC000-0xCFFF)
#
# Update these IDs once verified. The settings themselves are
# confirmed configurable on 3rd gen Tacoma via Techstream/Carista.
# All writable DIDs have safety constraints (data_length, min/max).
# ============================================================

[[did]]
id = 0xB100
name = "Seatbelt Warning Buzzer"
unit = "setting"
formula = "A"
ecu = "750"
writable = true
data_length = 1
min_value = 0x00
max_value = 0x01
description = "0x00 = disabled, 0x01 = enabled (factory default)"
category = "comfort"

[[did]]
id = 0xB101
name = "Auto Door Lock (by Speed)"
unit = "setting"
formula = "A"
ecu = "750"
writable = true
data_length = 1
min_value = 0x00
max_value = 0x02
description = "0x00 = off, 0x01 = lock at 20km/h, 0x02 = lock on shift from P"
category = "comfort"

[[did]]
id = 0xB102
name = "Auto Door Unlock (Shift to P)"
