# Toyota 2023 Tacoma (3rd Gen) Enhanced DID Definitions
# These are read via UDS Mode 22 (ReadDataByIdentifier)
# Add community-discovered DIDs here.
#
# Write safety fields (all optional, default-safe):
#   writable = true/false   — must be true to allow writes (default: false)
#   data_length = N         — exact byte count required for writes
#   min_value = 0xNN        — minimum value (data interpreted as big-endian integer)
#   max_value = 0xNN        — maximum value
#   description = "..."     — human-readable description of values
#   category = "..."        — grouping for browser display

# ============================================================
# ECM (Engine Control Module) — 0x7E0
# ============================================================

[[did]]
id = 0x0100
name = "Engine Coolant Temp (Enhanced)"
unit = "°C"
formula = "A - 40"
ecu = "7E0"
category = "engine"

