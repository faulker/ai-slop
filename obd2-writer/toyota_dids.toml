# ============================================================
# Additional Techstream-documented settings (addresses unknown)
# These are confirmed configurable but ECU/DID not yet discovered:
#
# Combination Meter (0x7C0, KWP2000):
#   - Lane change flash count (likely in one of the config blocks)
#   - Key reminder sound cycle: Fast/Normal/Slow
#   - ODO display time after ignition off: 30s/60s/600s/OFF
#
# A/C Amplifier:
#   - DEF Mode Setting, Temp Shift, Compressor Mode, Fan Speed
#
# Smart Key ECU (possibly 0x760):
#   - Hazard Answer Back, Auto Lock Time, Wireless Buzzer Volume
#   - Remote 2-Press Unlock, Auto Relock Timer
#
# Power Door Lock (BCM 0x750, KWP2000 sub-addressed at 0x40):
#   - Unlock Key Twice: ON/OFF
