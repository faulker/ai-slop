# ============================================================
# Additional Techstream-documented settings (DID addresses unknown)
# These are confirmed configurable but on different ECUs:
#
# Combination Meter (0x7C0):
#   - Driver Seatbelt Warning Buzzer: ON/OFF
#   - Front Passenger Seatbelt Warning Buzzer: ON/OFF
#   (Note: only the continuous chime >20km/h can be disabled)
#
# A/C Amplifier:
#   - DEF Mode Setting, Temp Shift, Compressor Mode, Fan Speed
#
# Smart Key ECU (possibly 0x760):
#   - Hazard Answer Back, Auto Lock Time, Wireless Buzzer Volume
#   - Remote 2-Press Unlock, Auto Relock Timer
#
# Power Door Lock (BCM 0x750):
#   - Unlock Key Twice: ON/OFF
#   - Auto Door Lock: OFF / Link Shift / Link Speed
#   - Auto Door Unlock: OFF / Link D-door / Link Shift
# ============================================================

