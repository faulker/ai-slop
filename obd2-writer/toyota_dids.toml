# ============================================================
# ============================================================
# Combination Meter — 0x7C0  (KWP2000 protocol)
# This ECU does NOT support UDS (service 0x22/0x2E).
# Read via KWP2000 service 0x21 (ReadDataByLocalIdentifier).
# Write via KWP2000 service 0x3B (WriteDataByLocalIdentifier).
#
# VERIFIED: Seatbelt chime at local ID 0xA7.
#   0xC0 = ON (factory default), 0x00 = OFF
# Write may return NRC 0x78 (responsePending) before success.
# ============================================================

[[did]]
id = 0xA7
name = "Seatbelt Warning Chime"
unit = "setting"
formula = "A"
ecu = "7C0"
protocol = "kwp"
writable = true
data_length = 1
min_value = 0x00
max_value = 0xC0
description = "Disables the extended warning chime >20km/h; initial 5 dings always remain."
category = "warnings"

[did.values]
"00" = "OFF"
"C0" = "ON (factory)"

# ============================================================
# BCM (Body Control Module) — 0x750
# Customization settings configurable via Techstream
#
# WARNING: The DID addresses below (0xB1xx) are UNVERIFIED
# placeholders. These settings exist in Techstream but Toyota
# does not publish the DID hex addresses. To discover real
# addresses, either:
#   1. Sniff Techstream CAN traffic while changing a setting
#   2. Brute-force scan: Mode 22 sweep on 0x750 (ranges
#      0x0100-0x01FF, 0xB000-0xBFFF, 0xC000-0xCFFF)
#
# Update these IDs once verified. The settings themselves are
# confirmed configurable on 3rd gen Tacoma via Techstream/Carista.
# All writable DIDs have safety constraints (data_length, min/max).
# ============================================================

